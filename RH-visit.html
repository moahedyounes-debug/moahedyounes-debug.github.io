<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رغوة الهجين - إدارة الزيارات</title>

<link rel="stylesheet" href="visit-manager.css">
<script src="api.js"></script>

<style>
.row4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
}

.row5 {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 15px;
}

.car-card {
    border: 2px solid #ddd;
    padding: 15px;
    border-radius: 10px;
    background: #fafafa;
    margin-top: 20px;
}

.car-card .btn-remove-car {
    width: auto !important;
    display: inline-block !important;
    padding: 6px 12px;
    background: #d9534f;
    color: white;
    border: none;
    border-radius: 6px;
    float: left;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="page-header">
    <h1>رغوة الهجين</h1>
    <h2>إدارة الزيارات</h2>
</div>

<div class="summary-bar">
    <div class="summary-item">
        <div class="label">الزيارات النشطة</div>
        <div class="value" id="summaryActive">0</div>
    </div>
    <div class="summary-item">
        <div class="label">السيارات حالياً</div>
        <div class="value" id="summaryCars">0</div>
    </div>
    <div class="summary-item">
        <div class="label">إجمالي المستحق</div>
        <div class="value" id="summaryTotal">0 ريال</div>
    </div>
</div>

<div class="section">
    <h3 class="section-title">🚗 سيارات داخل المغسلة (غير مدفوعة)</h3>
    <div id="activeVisitsList" class="cards">
        <div class="loading">جارِ التحميل...</div>
    </div>
    <button id="btnRefreshActive" class="btn-secondary full">🔄 تحديث القائمة</button>
</div>

<!-- النموذج الأساسي (4 + 4 + 5) -->
<div id="visitBox" class="section">
    <h3 class="section-title">📝 تسجيل زيارة جديدة</h3>

    <!-- الصف الأول -->
    <div class="row4">
        <div>
            <label>أرقام اللوحة *</label>
            <input type="text" id="plate_numbers">
        </div>
        <div>
            <label>حروف اللوحة *</label>
            <input type="text" id="plate_letters">
        </div>
        <div>
            <label>براند السيارة *</label>
            <select id="car_type"></select>
        </div>
        <div>
            <label>موديل السيارة *</label>
            <select id="car_model"></select>
        </div>
    </div>

    <!-- الصف الثاني -->
    <div class="row4" style="margin-top:15px;">
        <div>
            <label>نوع الخدمة *</label>
            <select id="service_type"></select>
        </div>
        <div>
            <label>تفاصيل الخدمة *</label>
            <select id="service_detail"></select>
        </div>
        <div>
            <label>الموظف *</label>
            <select id="employee_in"></select>
        </div>
        <div>
            <label>الموقف *</label>
            <select id="parking_slot">
                <option value="">— اختر —</option>
                <option>1</option><option>2</option><option>3</option>
                <option>4</option><option>5</option><option>6</option>
            </select>
        </div>
    </div>

    <!-- الصف الثالث -->
    <div class="row5" style="margin-top:15px;">
        <div>
            <label>حالة الدفع *</label>
            <select id="payment_status">
                <option value="">— اختر —</option>
                <option value="مدفوع">مدفوع</option>
                <option value="غير مدفوع">غير مدفوع</option>
            </select>
        </div>

        <div id="payment_method_wrapper" style="display:none;">
            <label>طريقة الدفع *</label>
            <select id="payment_method">
                <option value="">— اختر —</option>
                <option value="كاش">كاش</option>
                <option value="شبكة">شبكة</option>
                <option value="جزئي">جزئي</option>
            </select>
        </div>

        <div>
            <label>الخصم</label>
            <input type="number" id="discount" value="0" oninput="recalcTotal()">
        </div>

        <div>
            <label>الإكرامية</label>
            <input type="number" id="tip" value="0">
        </div>

        <div>
            <label>الحجم</label>
            <input type="text" id="car_size" readonly>
        </div>
    </div>

    <div id="partial_payment_box" style="display:none; margin-top:15px;">
        <div class="row4">
            <div>
                <label>الكاش</label>
                <input type="number" id="cash_amount">
            </div>
            <div>
                <label>الشبكة</label>
                <input type="number" id="card_amount">
            </div>
        </div>
    </div>

    <button id="btnAddService" class="btn-secondary full" onclick="addServiceToList()">➕ إضافة خدمة</button>
    <div id="servicesList"></div>

    <div class="total">الإجمالي: <span id="totalPrice">0</span> ريال</div>

    <button id="btnSubmitVisit" class="btn-primary full" onclick="submitVisit()">💾 تسجيل الزيارة</button>
</div>
<!-- الكروت الجديدة -->
<div id="carsContainer"></div>

<!-- قالب الكارد الجديد -->
<template id="carCardTemplate">
<div class="car-card">

    <!-- زر حذف السيارة (صغير وعلى اليسار) -->
    <button class="btn-remove-car">🗑 حذف</button>

    <!-- الصف الأول (4 خانات) -->
    <div class="row4" style="margin-top:15px;">
        <div>
            <label>أرقام اللوحة *</label>
            <input type="text" class="plate_numbers">
        </div>

        <div>
            <label>حروف اللوحة *</label>
            <input type="text" class="plate_letters">
        </div>

        <div>
            <label>براند السيارة *</label>
            <select class="car_type"></select>
        </div>

        <div>
            <label>موديل السيارة *</label>
            <select class="car_model"></select>
        </div>
    </div>

    <!-- الصف الثاني (4 خانات) -->
    <div class="row4" style="margin-top:15px;">
        <div>
            <label>نوع الخدمة *</label>
            <select class="service_type"></select>
        </div>

        <div>
            <label>تفاصيل الخدمة *</label>
            <select class="service_detail"></select>
        </div>

        <div>
            <label>الموظف *</label>
            <select class="employee_in"></select>
        </div>

        <div>
            <label>الموقف *</label>
            <select class="parking_slot">
                <option value="">— اختر —</option>
                <option>1</option><option>2</option><option>3</option>
                <option>4</option><option>5</option><option>6</option>
            </select>
        </div>
    </div>

    <!-- الصف الثالث (5 خانات) -->
    <div class="row5" style="margin-top:15px;">
        <div>
            <label>حالة الدفع *</label>
            <select class="payment_status">
                <option value="">— اختر —</option>
                <option value="مدفوع">مدفوع</option>
                <option value="غير مدفوع">غير مدفوع</option>
            </select>
        </div>

        <div class="payment_method_wrapper" style="display:none;">
            <label>طريقة الدفع *</label>
            <select class="payment_method">
                <option value="">— اختر —</option>
                <option value="كاش">كاش</option>
                <option value="شبكة">شبكة</option>
                <option value="جزئي">جزئي</option>
            </select>
        </div>

        <div>
            <label>الخصم</label>
            <input type="number" class="discount" value="0">
        </div>

        <div>
            <label>الإكرامية</label>
            <input type="number" class="tip" value="0">
        </div>

        <div>
            <label>الحجم</label>
            <input type="text" class="car_size" readonly>
        </div>
    </div>

    <!-- الدفع الجزئي -->
    <div class="partial_payment_box" style="display:none; margin-top:15px;">
        <div class="row4">
            <div>
                <label>الكاش</label>
                <input type="number" class="cash_amount" value="0">
            </div>
            <div>
                <label>الشبكة</label>
                <input type="number" class="card_amount" value="0">
            </div>
        </div>
    </div>

    <!-- الخدمات -->
    <button class="btnAddService btn-secondary full" style="margin-top:15px;">➕ إضافة خدمة</button>
    <div class="servicesList"></div>

</div>
</template>
<script>
/* عناصر أساسية */
const carsContainer = document.getElementById("carsContainer");
const btnAddCar = document.getElementById("btnAddCar");
const template = document.getElementById("carCardTemplate");

/* إضافة سيارة جديدة */
btnAddCar.onclick = () => {
    const clone = template.content.cloneNode(true);
    const card = clone.querySelector(".car-card");

    /* زر حذف السيارة */
    card.querySelector(".btn-remove-car").onclick = () => card.remove();

    /* عناصر الدفع */
    const payStatus = card.querySelector(".payment_status");
    const payMethodWrap = card.querySelector(".payment_method_wrapper");
    const partialBox = card.querySelector(".partial_payment_box");
    const payMethod = card.querySelector(".payment_method");

    /* شرط حالة الدفع */
    payStatus.onchange = () => {
        if (payStatus.value === "مدفوع") {
            payMethodWrap.style.display = "block";
        } else {
            payMethodWrap.style.display = "none";
            partialBox.style.display = "none";
            payMethod.value = "";
        }
    };

    /* الدفع الجزئي */
    payMethod.onchange = () => {
        partialBox.style.display = payMethod.value === "جزئي" ? "block" : "none";
    };

    /* تحميل البيانات داخل الكارد */
    loadCarTypesInto(card);
    loadServicesInto(card);
    loadEmployeesInto(card);

    /* إضافة خدمة داخل الكارد */
    card.querySelector(".btnAddService").onclick = () => addServiceToCard(card);

    carsContainer.appendChild(card);
};

/* تحميل أنواع السيارات داخل الكارد */
function loadCarTypesInto(card) {
    const brandSel = card.querySelector(".car_type");
    const modelSel = card.querySelector(".car_model");
    const sizeInput = card.querySelector(".car_size");

    brandSel.innerHTML = '<option value="">— اختر البراند —</option>';
    modelSel.innerHTML = '<option value="">— اختر الموديل —</option>';

    carTypesData.forEach(r => {
        if (!brandSel.querySelector(`option[value="${r[0]}"]`)) {
            const opt = document.createElement("option");
            opt.value = r[0];
            opt.textContent = r[0];
            brandSel.appendChild(opt);
        }
    });

    brandSel.onchange = () => {
        modelSel.innerHTML = '<option value="">— اختر الموديل —</option>';
        const models = carTypesData.filter(x => x[0] === brandSel.value);
        [...new Set(models.map(x => x[1]))].forEach(m => {
            const opt = document.createElement("option");
            opt.value = m;
            opt.textContent = m;
            modelSel.appendChild(opt);
        });
    };

    modelSel.onchange = () => {
        const row = carTypesData.find(x => x[0] === brandSel.value && x[1] === modelSel.value);
        sizeInput.value = row ? row[2] : "";
    };
}

/* تحميل الخدمات داخل الكارد */
function loadServicesInto(card) {
    const typeSel = card.querySelector(".service_type");
    const detailSel = card.querySelector(".service_detail");

    typeSel.innerHTML = '<option value="">— اختر النوع —</option>';
    detailSel.innerHTML = '<option value="">— اختر الخدمة —</option>';

    [...new Set(servicesData.map(s => s.category))].forEach(c => {
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        typeSel.appendChild(opt);
    });

    typeSel.onchange = () => {
        detailSel.innerHTML = '<option value="">— اختر الخدمة —</option>';
        servicesData.filter(s => s.category === typeSel.value).forEach(s => {
            const opt = document.createElement("option");
            opt.value = s.service;
            opt.textContent = s.service;
            opt.dataset.price = s.price;
            opt.dataset.points = s.commission;
            detailSel.appendChild(opt);
        });
    };
}

/* تحميل الموظفين داخل الكارد */
function loadEmployeesInto(card) {
    const sel = card.querySelector(".employee_in");
    sel.innerHTML = '<option value="">— اختر الموظف —</option>';

    employeesData.forEach(e => {
        const opt = document.createElement("option");
        opt.value = e[0];
        opt.textContent = e[0];
        sel.appendChild(opt);
    });
}

/* إضافة خدمة داخل الكارد */
function addServiceToCard(card) {
    const detailSel = card.querySelector(".service_detail");
    const name = detailSel.value;
    const price = Number(detailSel.selectedOptions[0]?.dataset.price || 0);

    if (!name) return alert("اختر خدمة أولاً");

    const box = card.querySelector(".servicesList");

    const div = document.createElement("div");
    div.className = "service-item";
    div.innerHTML = `
        <span>${name} — ${price} ريال</span>
        <button class="btn-remove-service">✕</button>
    `;

    div.querySelector(".btn-remove-service").onclick = () => div.remove();

    box.appendChild(div);
}

/* إرسال كل السيارات */
document.getElementById("btnSubmitVisit").onclick = async () => {
    /* أولاً: إرسال النموذج الأساسي */
    await submitVisit();

    /* ثانياً: إرسال السيارات الإضافية */
    const cards = document.querySelectorAll(".car-card");

    for (const card of cards) {
        const data = {
            plate_numbers: card.querySelector(".plate_numbers").value,
            plate_letters: card.querySelector(".plate_letters").value,
            car_type: card.querySelector(".car_type").value,
            car_model: card.querySelector(".car_model").value,
            car_size: card.querySelector(".car_size").value,
            service_type: card.querySelector(".service_type").value,
            service_detail: card.querySelector(".service_detail").value,
            employee_in: card.querySelector(".employee_in").value,
            parking_slot: card.querySelector(".parking_slot").value,
            payment_status: card.querySelector(".payment_status").value,
            payment_method: card.querySelector(".payment_method")?.value || "",
            discount: card.querySelector(".discount").value,
            tip: card.querySelector(".tip").value,
            cash_amount: card.querySelector(".cash_amount")?.value || 0,
            card_amount: card.querySelector(".card_amount")?.value || 0,
            services: "[]"
        };

        await apiAddVisit(data);
    }

    alert("🎉 تم تسجيل جميع الزيارات بنجاح");
};
</script>
