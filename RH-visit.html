<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رغوة الهجين - إدارة الزيارات</title>
<link rel="stylesheet" href="visit-manager.css">
<script src="api.js"></script>
</head>
<body>
<div class="container">
<!-- العنوان -->
<div class="page-header">
<h1>رغوة الهجين</h1>
<h2>إدارة الزيارات</h2>
</div>

<!-- شريط الملخص -->
<div class="summary-bar">
<div class="summary-item">
                <div class="label">الزيارات النشطة</div>
                <div class="label">الخدمات الحالية</div>
<div class="value" id="summaryActive">0</div>
</div>
<div class="summary-item">
<div class="label">السيارات حالياً</div>
<div class="value" id="summaryCars">0</div>
</div>
<div class="summary-item">
<div class="label">إجمالي المستحق</div>
<div class="value" id="summaryTotal">0 ريال</div>
</div>
</div>

<!-- السيارات داخل المغسلة -->
<div class="section">
<h3 class="section-title">🚗 سيارات داخل المغسلة (غير مدفوعة)</h3>
<div id="activeVisitsList" class="cards">
<div class="loading">جارِ التحميل...</div>
</div>
<button id="btnRefreshActive" class="btn-secondary full">🔄 تحديث القائمة</button>
</div>
<!-- تسجيل الزيارة -->
<div id="visitBox" class="section">
<h3 class="section-title">📝 تسجيل زيارة جديدة</h3>

<!-- الصف الأول (4 خانات) -->
<div class="row4">
    <div>
        <label>أرقام اللوحة *</label>
        <input type="text" id="plate_numbers" placeholder="1234" required>
    </div>
    <div>
        <label>حروف اللوحة</label>
        <input type="text" id="plate_letters" placeholder="ABC">
    </div>
    <div>
        <label>براند السيارة *</label>
        <select id="car_type" required>
            <option value="">— اختر البراند —</option>
        </select>
    </div>
    <div>
        <label>موديل السيارة *</label>
        <select id="car_model" required>
            <option value="">— اختر الموديل —</option>
        </select>
    </div>
</div>

<!-- الصف الثاني (4 خانات) -->
<div class="row4" style="margin-top:15px;">
    <div>
        <label>الحجم</label>
        <input type="text" id="car_size" readonly>
    </div>
    <div>
        <label>نوع الخدمة *</label>
        <select id="service_type" required>
            <option value="">— اختر النوع —</option>
        </select>
    </div>
    <div>
        <label>تفاصيل الخدمة *</label>
        <select id="service_detail" required>
            <option value="">— اختر الخدمة —</option>
        </select>
    </div>
    <div>
        <label>الموظف *</label>
        <select id="employee_in" required>
            <option value="">— اختر الموظف —</option>
        </select>
    </div>
</div>

<!-- الصف الثالث (5 خانات) -->
<div class="row5" style="margin-top:15px;">
    <div>
        <label>السعر</label>
        <input type="number" id="price" readonly>
    </div>
    <div>
        <label>النقاط / العمولة</label>
        <input type="number" id="points" readonly>
    </div>
    <div>
        <label>الخصم</label>
        <input type="number" id="discount" placeholder="0" value="0">
    </div>
    <div>
        <label>الإكرامية</label>
        <input type="number" id="tip" placeholder="0" value="0">
    </div>
    <div>
        <label>رقم الموقف *</label>
        <select id="parking_slot" required>
            <option value="">— اختر الموقف —</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
        </select>
    </div>
</div>

<!-- الصف الرابع (فرع + حالة الدفع + طريقة الدفع) -->
<div class="row4" style="margin-top:15px;">
    <div>
        <label>الفرع *</label>
        <select id="branch" required>
            <option value="">— اختر الفرع —</option>
        </select>
    </div>

    <div>
        <label>حالة الدفع *</label>
        <select id="payment_status" required>
            <option value="">— اختر الحالة —</option>
            <option value="مدفوع">مدفوع</option>
            <option value="غير مدفوع">غير مدفوع</option>
        </select>
    </div>

    <div id="payment_method_wrapper" style="display:none;">
        <label>طريقة الدفع *</label>
        <select id="payment_method">
            <option value="">— اختر الطريقة —</option>
            <option value="كاش">كاش</option>
            <option value="شبكة">شبكة</option>
            <option value="جزئي">جزئي (كاش + شبكة)</option>
        </select>
    </div>

    <div></div>
</div>

<!-- الدفع الجزئي -->
<div id="partial_payment_box" style="display:none; margin-top:15px;">
    <div class="row4">
        <div>
            <label>مبلغ الكاش</label>
            <input type="number" id="cash_amount" placeholder="0">
        </div>
        <div>
            <label>مبلغ الشبكة</label>
            <input type="number" id="card_amount" placeholder="0">
        </div>
    </div>
    <div class="total">المجموع المدفوع: <span id="paid_total">0</span> ريال</div>
</div>

<!-- إضافة خدمة -->
<button id="btnAddService" class="btn-secondary full">➕ إضافة خدمة</button>

<div id="servicesList" class="services-box"></div>

<div class="total">الإجمالي: <span id="totalPrice">0</span> ريال</div>

<button id="btnSubmitVisit" class="btn-primary full" style="margin-top:20px;" onclick="submitVisit()">💾 تسجيل الزيارة</button>

</div>
</div>

<!-- زر إضافة سيارة جديدة -->
<button id="btnAddCar" class="btn-secondary full" style="margin-top:25px;">
    ➕ إضافة سيارة جديدة
</button>

<!-- حاوية السيارات الإضافية -->
<div id="carsContainer"></div>

<!-- قالب السيارة الإضافية -->
<template id="carCardTemplate">
<div class="car-card">

    <button class="btn-remove-car">🗑 حذف</button>

    <div class="row4" style="margin-top:15px;">
        <div>
            <label>أرقام اللوحة *</label>
            <input type="text" class="plate_numbers">
        </div>

        <div>
            <label>حروف اللوحة *</label>
            <input type="text" class="plate_letters">
        </div>

        <div>
            <label>براند السيارة *</label>
            <select class="car_type"></select>
        </div>

        <div>
            <label>موديل السيارة *</label>
            <select class="car_model"></select>
        </div>
    </div>

    <div class="row4" style="margin-top:15px;">
        <div>
            <label>نوع الخدمة *</label>
            <select class="service_type"></select>
        </div>

        <div>
            <label>تفاصيل الخدمة *</label>
            <select class="service_detail"></select>
        </div>

        <div>
            <label>الموظف *</label>
            <select class="employee_in"></select>
        </div>

        <div>
            <label>الموقف *</label>
            <select class="parking_slot">
                <option value="">— اختر —</option>
                <option>1</option><option>2</option><option>3</option>
                <option>4</option><option>5</option><option>6</option>
            </select>
        </div>
    </div>

</div>
</template>

<!-- سكربت تعدد السيارات -->
<script>
document.addEventListener("DOMContentLoaded", () => {

    const btnAddCar = document.getElementById("btnAddCar");
    const carsContainer = document.getElementById("carsContainer");
    const template = document.getElementById("carCardTemplate");

    btnAddCar.onclick = () => {
        const clone = template.content.cloneNode(true);
        const card = clone.querySelector(".car-card");

        // حذف السيارة
        card.querySelector(".btn-remove-car").onclick = () => card.remove();

        // تحميل البيانات
        loadCarTypesIntoCard(card);
        loadServicesIntoCard(card);
        loadEmployeesIntoCard(card);

        carsContainer.appendChild(card);
    };

    function loadCarTypesIntoCard(card) {
        const brandSel = card.querySelector(".car_type");
        const modelSel = card.querySelector(".car_model");

        brandSel.innerHTML = '<option value="">— اختر —</option>';
        modelSel.innerHTML = '<option value="">— اختر —</option>';

        carTypesData.forEach(r => {
            if (!brandSel.querySelector(`option[value="${r[0]}"]`)) {
                const opt = document.createElement("option");
                opt.value = r[0];
                opt.textContent = r[0];
                brandSel.appendChild(opt);
            }
        });

        brandSel.onchange = () => {
            modelSel.innerHTML = '<option value="">— اختر —</option>';
            const models = carTypesData.filter(x => x[0] === brandSel.value);
            [...new Set(models.map(x => x[1]))].forEach(m => {
                const opt = document.createElement("option");
                opt.value = m;
                opt.textContent = m;
                modelSel.appendChild(opt);
            });
        };
    }

    function loadServicesIntoCard(card) {
        const typeSel = card.querySelector(".service_type");
        const detailSel = card.querySelector(".service_detail");

        typeSel.innerHTML = '<option value="">— اختر —</option>';
        detailSel.innerHTML = '<option value="">— اختر —</option>';

        [...new Set(servicesData.map(s => s.category))].forEach(c => {
            const opt = document.createElement("option");
            opt.value = c;
            opt.textContent = c;
            typeSel.appendChild(opt);
        });

        typeSel.onchange = () => {
            detailSel.innerHTML = '<option value="">— اختر —</option>';
            servicesData.filter(s => s.category === typeSel.value).forEach(s => {
                const opt = document.createElement("option");
                opt.value = s.service;
                opt.textContent = s.service;
                detailSel.appendChild(opt);
            });
        };
    }

    function loadEmployeesIntoCard(card) {
        const sel = card.querySelector(".employee_in");

        sel.innerHTML = '<option value="">— اختر —</option>';

        employeesData.forEach(e => {
            const opt = document.createElement("option");
            opt.value = e[0];
            opt.textContent = e[0];
            sel.appendChild(opt);
        });
    }

});
</script>
</body>
</html>
