<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رغوة الهجين - إدارة الزيارات</title>

    <!-- CSS الجديد -->
    <link rel="stylesheet" href="visit-manager-new.css">

    <!-- API -->
    <script src="api.js"></script>
</head>

<body>

<div class="container">

    <!-- العنوان -->
    <div class="page-header">
        <h1>رغوة الهجين</h1>
        <h2>إدارة الزيارات</h2>
    </div>

    <!-- الملخص -->
    <div class="summary-bar">
        <div class="summary-item">
            <div class="label">الخدمات الحالية</div>
            <div class="value" id="summaryActive">0</div>
        </div>
        <div class="summary-item">
            <div class="label">السيارات حالياً</div>
            <div class="value" id="summaryCars">0</div>
        </div>
        <div class="summary-item">
            <div class="label">إجمالي المستحق</div>
            <div class="value" id="summaryTotal">0 ريال</div>
        </div>
    </div>

    <!-- السيارات داخل المغسلة -->
    <div class="section">
        <h3 class="section-title">🚗 سيارات داخل المغسلة (غير مدفوعة)</h3>

        <div id="activeVisitsList" class="cards">
            <div class="loading">جارِ التحميل...</div>
        </div>

        <button id="btnRefreshActive" class="btn-secondary full">🔄 تحديث القائمة</button>
    </div>

    <!-- زر إضافة سيارة -->
    <button id="btnAddCar" class="btn-primary full" style="margin-bottom:20px;">
        + إضافة سيارة
    </button>

    <!-- هنا تضاف السيارات -->
    <div id="carsContainer"></div>

    <!-- زر تسجيل الزيارة -->
    <button id="btnSubmitVisit" class="btn-primary full" style="margin-top:20px;">
        💾 تسجيل الزيارة
    </button>

</div>

<!-- قالب السيارة -->
<template id="carCardTemplate">
    <div class="car-card">

        <button class="btn-remove-car">✕</button>

        <h3 class="car-title">🚗 سيارة جديدة</h3>

        <!-- الصف الأول (4 خانات) -->
        <div class="row row-4">
            <div>
                <label>أرقام اللوحة *</label>
                <input class="plate_numbers" placeholder="1234">
            </div>

            <div>
                <label>حروف اللوحة</label>
                <input class="plate_letters" placeholder="ABC">
            </div>

            <div>
                <label>براند السيارة *</label>
                <select class="car_type"></select>
            </div>

            <div>
                <label>موديل السيارة *</label>
                <select class="car_model"></select>
            </div>
        </div>

        <!-- الصف الثاني (4 خانات) -->
        <div class="row row-4">
            <div>
                <label>نوع الخدمة *</label>
                <select class="service_type"></select>
            </div>

            <div>
                <label>تفاصيل الخدمة *</label>
                <select class="service_detail"></select>
            </div>

            <div>
                <label>السعر</label>
                <input class="price" readonly>
            </div>

            <div>
                <label>النقاط</label>
                <input class="points" readonly>
            </div>
        </div>

        <!-- الصف الثالث (5 خانات) -->
        <div class="row row-5">
            <div>
                <label>الموظف *</label>
                <select class="employee_in"></select>
            </div>

            <div>
                <label>رقم الموقف *</label>
                <select class="parking_slot">
                    <option value="">اختر</option>
                    <option>1</option><option>2</option><option>3</option>
                    <option>4</option><option>5</option><option>6</option>
                </select>
            </div>

            <div>
                <label>الخصم</label>
                <input class="discount" value="0">
            </div>

            <div>
                <label>الإكرامية</label>
                <input class="tip" value="0">
            </div>

            <div>
                <label>الحجم</label>
                <input class="car_size" readonly>
            </div>
        </div>

        <!-- الدفع -->
        <div class="row row-4">
            <div>
                <label>حالة الدفع *</label>
                <select class="payment_status">
                    <option value="">اختر</option>
                    <option value="مدفوع">مدفوع</option>
                    <option value="غير مدفوع">غير مدفوع</option>
                </select>
            </div>

            <div>
                <label>طريقة الدفع *</label>
                <select class="payment_method">
                    <option value="">اختر</option>
                    <option value="كاش">كاش</option>
                    <option value="شبكة">شبكة</option>
                    <option value="جزئي">جزئي</option>
                </select>
            </div>

            <div>
                <label>كاش</label>
                <input class="cash_amount" value="0">
            </div>

            <div>
                <label>شبكة</label>
                <input class="card_amount" value="0">
            </div>
        </div>

        <!-- الخدمات -->
        <button class="btn-secondary full btnAddService">+ إضافة خدمة</button>

        <div class="services-box servicesList"></div>

        <div class="total">الإجمالي: <span class="totalPrice">0</span> ريال</div>

    </div>
</template>

<!-- JS الجديد -->
<script src="visit-manager-new.js"></script>

</body>
</html>
