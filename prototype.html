<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>رغوة الهجين - إدارة الزيارات</title>

<!-- ربط ملف التنسيق -->
<link rel="stylesheet" href="visit-manager.css">

</head>
<body>

<div class="container">

    <!-- الهيدر -->
    <div class="page-header">
        <h1>رغوة الهجين</h1>
        <h2>إدارة الزيارات</h2>
    </div>

    <!-- الملخص -->
    <div class="summary-bar">
        <div class="summary-item">
            <div class="label">الخدمات الحالية</div>
            <div class="value" id="summaryActive">0</div>
        </div>

        <div class="summary-item">
            <div class="label">السيارات حالياً</div>
            <div class="value" id="summaryCars">0</div>
        </div>

        <div class="summary-item">
            <div class="label">إجمالي المستحق</div>
            <div class="value" id="summaryTotal">0 ريال</div>
        </div>
    </div>

    <!-- السيارات داخل المغسلة -->
    <div class="section">
        <h3 class="section-title">🚗 سيارات داخل المغسلة (غير مدفوعة)</h3>
        <div id="activeVisitsList"></div>
    </div>

    <!-- تسجيل زيارة جديدة -->
    <div class="section">
        <h3 class="section-title">تسجيل زيارة جديدة</h3>

        <!-- الصف الأول -->
        <div class="row">
            <div>
                <label>أرقام اللوحة *</label>
                <input id="plate_numbers" placeholder="1234">
            </div>

            <div>
                <label>حروف اللوحة *</label>
                <input id="plate_letters" placeholder="ABC">
            </div>

            <div>
                <label>براند السيارة *</label>
                <select id="car_type">
                    <option value="">اختر البراند</option>
                </select>
            </div>

            <div>
                <label>موديل السيارة *</label>
                <select id="car_model">
                    <option value="">اختر الموديل</option>
                </select>
            </div>
        </div>

        <!-- الصف الثاني -->
        <div class="row">
            <div>
                <label>نوع الخدمة *</label>
                <select id="service_type">
                    <option value="">اختر النوع</option>
                </select>
            </div>

            <div>
                <label>تفاصيل الخدمة *</label>
                <select id="service_detail">
                    <option value="">اختر الخدمة</option>
                </select>
            </div>

            <div>
                <label>الموظف *</label>
                <select id="employee_in">
                    <option value="">اختر الموظف</option>
                </select>
            </div>

            <div>
                <label>رقم الموقف *</label>
                <select id="parking_slot">
                    <option value="">اختر الموقف</option>
                </select>
            </div>
        </div>

        <!-- الصف الثالث (5 خانات) -->
        <div class="row-5">
            <div>
                <label>السعر</label>
                <input id="price" readonly>
            </div>

            <div>
                <label>حالة الدفع *</label>
                <select id="payment_status">
                    <option value="">اختر الحالة</option>
                    <option value="مدفوع">مدفوع</option>
                    <option value="غير مدفوع">غير مدفوع</option>
                </select>
            </div>

            <div>
                <label>طريقة الدفع *</label>
                <select id="payment_method">
                    <option value="">اختر الطريقة</option>
                    <option value="كاش">كاش</option>
                    <option value="شبكة">شبكة</option>
                    <option value="جزئي">جزئي</option>
                </select>
            </div>

            <div>
                <label>الخصم</label>
                <input id="discount" value="0">
            </div>

            <div>
                <label>الإكرامية</label>
                <input id="tip" value="0">
            </div>
        </div>

        <button id="btnSubmitVisit" class="btn-primary full">تسجيل الزيارة</button>
    </div>

</div>

<!-- مودال الدفع -->
<div id="paymentModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-header">
            <h3>💳 تحديث الدفع</h3>
            <button id="modal_close" class="btn-danger">إغلاق</button>
        </div>

        <label>طريقة الدفع</label>
        <select id="modal_method_select">
            <option value="كاش">كاش</option>
            <option value="شبكة">شبكة</option>
            <option value="جزئي">جزئي</option>
        </select>

        <div id="cash_box">
            <label>المبلغ كاش</label>
            <input id="modal_cash">
        </div>

        <div id="card_box">
            <label>المبلغ شبكة</label>
            <input id="modal_card">
        </div>

        <label>الخصم</label>
        <input id="modal_discount_input">

        <label>الإكرامية</label>
        <input id="modal_tip_input">

        <div class="modal-actions">
            <button id="modal_confirm" class="btn-primary">تأكيد</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast-container"></div>

<!-- ربط ملف الجافاسكربت -->
<script src="visit-manager.js"></script>

</body>
</html>
