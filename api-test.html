<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء عضوية PassKit فقط</title>

<style>
body { font-family: Tahoma; padding: 20px; background:#f2f2f2 }
.card { background:#fff; padding:20px; border-radius:10px; border:1px solid #ccc; max-width:400px; margin:auto }
button { padding:10px 20px; background:#2563eb; color:#fff; border:none; border-radius:6px; cursor:pointer; width:100% }
button:hover { background:#1e4fc7 }
input { width:100%; padding:10px; margin:10px 0; border-radius:6px; border:1px solid #ccc }
#result { white-space:pre-wrap; background:#fff; padding:15px; border-radius:10px; border:1px solid #ddd; margin-top:20px }
</style>
</head>

<body>

<div class="card">
  <h2>🎫 إنشاء عضوية PassKit فقط</h2>

  <label>رقم الجوال</label>
  <input id="phone" placeholder="05XXXXXXXX">

  <button onclick="createMemberOnly()">إنشاء عضوية فقط</button>

  <pre id="result">— لا توجد نتائج بعد —</pre>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbybiK02cg7ifvNAPuQP9VzRiaKxxGQT5EU6iV2kZcWXvLKtqTBOfx5ObPCDfJAY6bP7SA/exec";

async function createMemberOnly() {
  const phone = document.getElementById("phone").value;

  const form = new URLSearchParams();
  form.append("action", "createMemberOnly"); // دالة جديدة نضيفها في GAS
  form.append("phone", phone);

  const res = await fetch(API, { method:"POST", body:form });
  const json = await res.json();

  document.getElementById("result").textContent = JSON.stringify(json, null, 2);
}
</script>

</body>
</html>
