<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>حجز موعد جديد</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family:"Tajawal",sans-serif;
      background: url('logo.png') center/cover no-repeat fixed, #050608;
      color:#f5f5f5;
      padding:20px;
    }
    h2{
      text-align:center;
      margin-bottom:16px;
    }
    .box{
      background:rgba(0,0,0,0.65);
      padding:20px;
      border-radius:16px;
      max-width:420px;
      margin:auto;
      box-shadow:0 8px 20px rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
    }
    label{
      font-size:13px;
      color:#9ca3af;
      display:block;
      margin-bottom:4px;
    }
    input,select{
      width:100%;
      padding:10px;
      border-radius:10px;
      border:none;
      margin-bottom:10px;
      background:#1a1c22;
      color:white;
      font-size:14px;
    }
    .btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:999px;
      background:linear-gradient(135deg,#22c55e,#16a34a);
      color:white;
      font-size:16px;
      cursor:pointer;
      margin-top:10px;
    }
    .btn-outline{
      background:transparent;
      border:1px solid #374151;
    }

    /* Toast */
    #toast-container{
      position:fixed;
      bottom:20px;
      right:20px;
      z-index:9999;
    }
    .toast{
      background:#1f2937;
      color:white;
      padding:12px 18px;
      border-radius:8px;
      margin-top:10px;
      opacity:0;
      transform:translateY(20px);
      transition:0.3s;
      border-right:5px solid #3b82f6;
    }
    .toast.success{ border-right-color:#22c55e; }
    .toast.error{ border-right-color:#ef4444; }
    .toast.show{
      opacity:1;
      transform:translateY(0);
    }
  </style>
</head>

<body>

<h2>حجز موعد جديد</h2>

<div class="box">

  <label>السيارة</label>
  <select id="car">
    <option value="">جاري التحميل...</option>
  </select>

  <label>الفئة (Category)</label>
  <select id="category" onchange="loadServices()">
    <option value="">اختر الفئة</option>
  </select>

  <label>الخدمة</label>
  <select id="service" onchange="updatePrice()">
    <option value="">اختر الخدمة</option>
  </select>

  <label>السعر</label>
  <input type="text" id="price" readonly placeholder="السعر يظهر تلقائياً">

  <label>الفرع</label>
  <select id="branch">
    <option value="">اختر الفرع</option>
  </select>

  <label>التاريخ</label>
  <input type="date" id="date" onchange="loadAvailableTimes()">

  <label>الوقت (10 صباحًا إلى 3 فجراً)</label>
  <select id="time">
    <option value="">اختر الوقت</option>
  </select>

  <button class="btn" onclick="addBooking()">تأكيد الحجز</button>
  <button class="btn btn-outline" onclick="window.location.href='customer-bookings.html'">
    العودة لقائمة الحجوزات
  </button>

</div>

<div id="toast-container"></div>

<script src="api.js"></script>
<script>

let CUSTOMER = JSON.parse(localStorage.getItem("customer") || "null");
if(!CUSTOMER){
  window.location.href = "customer-login.html";
}

let SERVICES = [];
let BRANCHES = [];

/* =============================
   Toast Notifications
============================= */
function showToast(message, type = "info") {
  const container = document.getElementById("toast-container");
  const toast = document.createElement("div");
  toast.className = `toast ${type}`;
  toast.innerText = message;
  container.appendChild(toast);

  setTimeout(() => toast.classList.add("show"), 10);
  setTimeout(() => {
    toast.classList.remove("show");
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

/* =============================
   تنسيق التاريخ والوقت
============================= */
function formatDate(dateStr){
  const d = new Date(dateStr);
  const month = d.toLocaleString("en-US", { month: "short" });
  const day = String(d.getDate()).padStart(2, "0");
  const year = d.getFullYear();
  return `${month}/${day}/${year}`;
}

function formatTime(timeStr){
  return timeStr.slice(0,5);
}

/* =============================
   تحميل الصفحة
============================= */
window.onload = async function(){
  await loadCars();
  await loadCategories();
  await loadBranches();
};

/* =============================
   تحميل سيارات العميل
============================= */
async function loadCars() {
  const carSelect = document.getElementById("car");

  const res = await apiGetCarsByPhone(CUSTOMER.phone);

  if (!res.success || !res.cars.length) {
    carSelect.innerHTML = `<option value="">لا توجد سيارات</option>`;
    return;
  }

  const cars = res.cars.map(c => c.data);

  if (cars.length === 1) {
    carSelect.innerHTML = `
      <option value="${cars[0][0]}">
        ${cars[0][2]} - ${cars[0][5]} ${cars[0][4]}
      </option>
    `;
    return;
  }

  carSelect.innerHTML = `
    <option value="">اختر السيارة</option>
    ${cars.map(c => `
      <option value="${c[0]}">
        ${c[2]} - ${c[5]} ${c[4]}
      </option>
    `).join("")}
  `;
}

/* =============================
   تحميل الفئات
============================= */
async function loadCategories(){
  const res = await apiGetServices();
  if(!res.success){
    showToast("خطأ في تحميل الفئات", "error");
    return;
  }

  SERVICES = res.services;

  const categories = [...new Set(SERVICES.map(s => s.category))];

  document.getElementById("category").innerHTML =
    `<option value="">اختر الفئة</option>` +
    categories.map(c => `<option value="${c}">${c}</option>`).join("");
}

/* =============================
   تحميل الخدمات حسب الفئة
============================= */
function loadServices(){
  const category = document.getElementById("category").value;

  const filtered = SERVICES.filter(s => s.category === category);

  document.getElementById("service").innerHTML =
    `<option value="">اختر الخدمة</option>` +
    filtered.map(s => `<option value="${s.service}">${s.service}</option>`).join("");

  document.getElementById("price").value = "";
}

/* =============================
   تحديث السعر
============================= */
function updatePrice(){
  const service = document.getElementById("service").value;

  const row = SERVICES.find(s => s.service === service);
  if(row){
    document.getElementById("price").value = row.price + " ريال";
  }
}

/* =============================
   تحميل الفروع
============================= */
async function loadBranches(){
  const res = await apiGetBranches();
  if(!res.success){
    showToast("خطأ في تحميل الفروع", "error");
    return;
  }

  BRANCHES = res.rows;

  const branchSelect = document.getElementById("branch");

  if(BRANCHES.length === 1){
    branchSelect.innerHTML = `<option value="${BRANCHES[0][0]}">${BRANCHES[0][0]}</option>`;
  } else {
    branchSelect.innerHTML =
      `<option value="">اختر الفرع</option>` +
      BRANCHES.map(b => `<option value="${b[0]}">${b[0]}</option>`).join("");
  }
}

/* =============================
   تحميل الأوقات المتاحة (محدث)
============================= */
async function loadAvailableTimes() {
  const date = document.getElementById("date").value;
  const timeSelect = document.getElementById("time");
  const selectedCar = document.getElementById("car").value;

  if (!date) {
    timeSelect.innerHTML = `<option value="">اختر الوقت</option>`;
    return;
  }

  const res = await apiGetBookingsByDate(date);
  const bookings = res.success ? res.bookings : [];

  const countByTime = {};
  const carTimes = {};

  bookings.forEach(b => {
    const data = b.data;
    const membership = data[1];
    const t = data[4];
    const status = data[5];

    if (status !== "ملغي") {
      countByTime[t] = (countByTime[t] || 0) + 1;

      if (membership === selectedCar) {
        carTimes[t] = true;
      }
    }
  });

  timeSelect.innerHTML = `<option value="">اختر الوقت</option>`;

  function addTimeOption(t) {
    if (carTimes[t]) return;
    if (countByTime[t] >= 2) return; // الحد = سيارتين فقط
    timeSelect.innerHTML += `<option value="${t}">${formatTime(t)}</option>`;
  }

  for (let h = 10; h <= 23; h++) {
    const hour = h.toString().padStart(2, "0");
    ["00", "30"].forEach(min => addTimeOption(`${hour}:${min}`));
  }

  ["00:00","00:30","01:00","01:30","02:00","02:30","03:00"]
    .forEach(t => addTimeOption(t));
}

/* =============================
   إنشاء الحجز
============================= */
async function addBooking(){
  const car = document.getElementById("car").value;
  const category = document.getElementById("category").value;
  const service = document.getElementById("service").value;
  const branch = document.getElementById("branch").value;

  const rawDate = document.getElementById("date").value;
  const rawTime = document.getElementById("time").value;

  if(!car || !category || !service || !branch || !rawDate || !rawTime){
    showToast("الرجاء تعبئة جميع الحقول", "error");
    return;
  }

  const date = formatDate(rawDate);
  const time = formatTime(rawTime);

  const createdAt = new Date().toISOString();

  const res = await apiPost({
    action: "addBooking",
    phone: String(CUSTOMER.phone),
    membership: car,
    service,
    date,
    time,
    status: "قيد الانتظار",
    created_at: createdAt
  });

  if(!res.success){
    showToast("خطأ في الحجز: " + res.error, "error");
    return;
  }

  showToast("تم إنشاء الحجز بنجاح", "success");

  setTimeout(() => {
    window.location.href = "customer-bookings.html";
  }, 1200);
}

</script>

</body>
</html>
